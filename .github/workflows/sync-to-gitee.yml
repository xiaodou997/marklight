name: Sync to Gitee

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有历史用于同步

      - name: Sync to Gitee
        env:
          GITEE_RSA_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          # 配置 SSH
          mkdir -p ~/.ssh
          echo "$GITEE_RSA_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 移除 GitHub Actions 工作流文件（不需要同步到 Gitee）
          rm -rf .github/workflows/sync-to-gitee.yml

          # 添加 Gitee 远程仓库
          git remote add gitee $GITEE_REPO || git remote set-url gitee $GITEE_REPO

          # 只同步当前触发的 ref，避免 --tags 全量推送撞上 Gitee 已存在但对象不同的历史 tag。
          if [ "$GITHUB_REF_TYPE" = "branch" ]; then
            git push -f gitee HEAD:main
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            git push -f gitee "refs/tags/$GITHUB_REF_NAME:refs/tags/$GITHUB_REF_NAME"
          fi

          echo "✅ Sync to Gitee completed!"
