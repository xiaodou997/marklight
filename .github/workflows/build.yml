name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成 Changelog

      - name: Generate Structured Changelog
        id: changelog
        shell: bash
        run: |
          # 获取标签范围
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:%s --since="1 month ago")
          else
            COMMITS=$(git log --pretty=format:%s $PREV_TAG..HEAD)
          fi

          # 初始化类别
          FEATS=""
          FIXES=""
          PERFS=""
          REFACTORS=""
          DOCS=""
          OTHERS=""

          while IFS= read -r COMMIT; do
            case "$COMMIT" in
              feat:*) FEATS="$FEATS\n* ${COMMIT#feat: }" ;;
              fix:*) FIXES="$FIXES\n* ${COMMIT#fix: }" ;;
              perf:*) PERFS="$PERFS\n* ${COMMIT#perf: }" ;;
              refactor:*) REFACTORS="$REFACTORS\n* ${COMMIT#refactor: }" ;;
              docs:*) DOCS="$DOCS\n* ${COMMIT#docs: }" ;;
              chore:*|ci:*|style:*|test:*) ;; # 忽略这些琐碎提交
              *) [ ! -z "$COMMIT" ] && OTHERS="$OTHERS\n* $COMMIT" ;;
            esac
          done <<< "$COMMITS"

          # 构建最终 Markdown
          BODY="## 🎉 MarkLight ${{ github.ref_name }} 版本发布\n"
          [ ! -z "$FEATS" ] && BODY="$BODY\n### 🚀 新功能\n$FEATS"
          [ ! -z "$FIXES" ] && BODY="$BODY\n### 🐛 修复\n$FIXES"
          [ ! -z "$PERFS" ] && BODY="$BODY\n### ⚡ 性能优化\n$PERFS"
          [ ! -z "$REFACTORS" ] && BODY="$BODY\n### 🔨 代码重构\n$REFACTORS"
          [ ! -z "$DOCS" ] && BODY="$BODY\n### 📚 文档更新\n$DOCS"
          [ ! -z "$OTHERS" ] && BODY="$BODY\n### 📝 其他变动\n$OTHERS"

          BODY="$BODY\n\n---\n### 📦 平台支持说明\n* **macOS**: 支持 Apple Silicon (aarch64) 和 Intel (x64) 架构。\n* **Windows**: 提供标准安装向导 (.exe)。\n* **Linux**: 提供 AppImage 格式，下载后赋予执行权限即可运行。"

          # 处理多行输出
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkLight ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
