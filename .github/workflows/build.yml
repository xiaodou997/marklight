name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成 Changelog

      - name: Generate Structured Changelog
        id: changelog
        shell: bash
        run: |
          # 获取标签范围
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # 如果没有上一个标签，获取最近 30 天或所有提交
            COMMITS=$(git log --pretty=format:%s --since="1 month ago")
          else
            COMMITS=$(git log --pretty=format:%s $PREV_TAG..HEAD)
          fi

          # 初始化类别
          FEATS=""
          FIXES=""
          PERFS=""
          REFACTORS=""
          DOCS=""
          UI_STYLE=""
          CHORES=""
          OTHERS=""

          while IFS= read -r COMMIT; do
            # 忽略 CI 和无意义的提交
            [[ "$COMMIT" =~ ^ci: ]] && continue
            
            if [[ "$COMMIT" =~ ^feat(\(.*\))?: ]]; then
              FEATS="$FEATS\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^fix(\(.*\))?: ]]; then
              FIXES="$FIXES\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^perf(\(.*\))?: ]]; then
              PERFS="$PERFS\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^refactor(\(.*\))?: ]]; then
              REFACTORS="$REFACTORS\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^docs(\(.*\))?: ]]; then
              DOCS="$DOCS\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^style(\(.*\))?: ]]; then
              UI_STYLE="$UI_STYLE\n* ${COMMIT}"
            elif [[ "$COMMIT" =~ ^(chore|build)(\(.*\))?: ]]; then
              CHORES="$CHORES\n* ${COMMIT}"
            else
              [ ! -z "$COMMIT" ] && OTHERS="$OTHERS\n* $COMMIT"
            fi
          done <<< "$COMMITS"

          # 构建最终 Markdown
          BODY="## 🎉 MarkLight ${{ github.ref_name }} 版本发布\n"
          [ ! -z "$FEATS" ] && BODY="$BODY\n### 🚀 新功能\n$FEATS"
          [ ! -z "$FIXES" ] && BODY="$BODY\n### 🐛 修复\n$FIXES"
          [ ! -z "$UI_STYLE" ] && BODY="$BODY\n### 🎨 UI 与样式\n$UI_STYLE"
          [ ! -z "$PERFS" ] && BODY="$BODY\n### ⚡ 性能优化\n$PERFS"
          [ ! -z "$REFACTORS" ] && BODY="$BODY\n### 🔨 代码重构\n$REFACTORS"
          [ ! -z "$DOCS" ] && BODY="$BODY\n### 📚 文档更新\n$DOCS"
          [ ! -z "$CHORES" ] && BODY="$BODY\n### 🏗️ 维护与工程\n$CHORES"
          [ ! -z "$OTHERS" ] && BODY="$BODY\n### 📝 其他变动\n$OTHERS"

          BODY="$BODY\n\n---\n### 📦 平台支持说明\n* **macOS**: 支持 Apple Silicon (aarch64) 和 Intel (x64) 架构。\n* **Windows**: 提供标准安装向导 (.exe)。"

          # 处理多行输出
          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkLight ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
