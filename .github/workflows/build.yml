name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkLight ${{ github.ref_name }}'
          releaseBody: |
            ## 🎉 MarkLight ${{ github.ref_name }}
            
            ### 下载安装包
            
            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `MarkLight_*_aarch64.dmg` |
            | macOS (Intel) | `MarkLight_*_x64.dmg` |
            | Windows | `MarkLight_*_x64-setup.exe` |
            | Linux | `MarkLight_*_amd64.AppImage` |
            
            ### 使用说明
            
            1. 下载对应平台的安装包
            2. macOS: 打开 .dmg 文件，将 MarkLight 拖入 Applications 文件夹
            3. Windows: 运行 .exe 安装程序
            4. Linux: 给予 .AppImage 执行权限后直接运行
            
            ---
            
            > 这是自动构建的 Release，由 GitHub Actions 生成。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
